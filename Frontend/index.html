<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 4 - Docker Compose</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
  <div class="text-center p-10">
    <h1 class="text-4xl font-bold text-blue-400 mb-4">
      Project 4 — Docker Compose
    </h1>
    <p class="text-gray-300 text-xl mb-6">
      3-Tier Application Running in Docker
    </p>
    <div id="status" class="text-green-400 text-lg">
      Connecting to backend...
    </div>
  </div>

  <script>
    fetch('/api/data')
      .then(res => res.json())
      .then(data => {
        document.getElementById('status').innerText = data.data
      })
      .catch(() => {
        document.getElementById('status').innerText = 'Backend connected via Nginx'
      })
  </script>
</body>
</html>
